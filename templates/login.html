{% extends 'base.html' %}
{% block title %}Login — Bazaar{% endblock %}
{% block extra_css %}
<style>
.auth-wrap { min-height:calc(100vh - 64px); display:flex; align-items:center; justify-content:center; padding:40px 24px; }
.auth-card { background:var(--card); border:1px solid var(--border); border-radius:20px; padding:48px 40px; width:100%; max-width:420px; box-shadow:var(--shadow); }
.auth-title { font-family:'Syne',sans-serif; font-size:1.8rem; font-weight:800; margin-bottom:4px; }
.auth-sub { color:var(--text2); margin-bottom:32px; }
.captcha-wrap { display:flex; align-items:center; gap:12px; margin-bottom:20px; }
</style>
{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-title">Welcome Back</div>
    <div class="auth-sub">Sign in to your Bazaar account</div>
    <form method="post">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control" required placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" required>
      </div>
      <div class="form-group">
        <label class="form-label">🔐 CAPTCHA</label>
        <div class="captcha-wrap">
          <img src="{{ url_for('captcha_image') }}" id="captcha-img" width="150" height="50"
               style="border-radius:8px;border:1px solid var(--border);cursor:pointer"
               onclick="this.src='{{ url_for('captcha_image') }}?t='+Date.now()" title="Click to refresh">
          <span style="font-size:0.78rem;color:var(--text2)">Click to<br>refresh</span>
        </div>
        <input type="text" name="captcha" class="form-control" required placeholder="Enter the code above" autocomplete="off">
      </div>
      <button type="submit" class="btn btn-primary btn-full">Sign In <i class="fas fa-sign-in-alt"></i></button>
    </form>
    <div style="text-align:center;margin-top:24px;color:var(--text2);font-size:0.9rem">
      New to Bazaar? <a href="{{ url_for('register') }}" style="color:var(--accent)">Create account</a>
    </div>
  </div>
</div>
{% endblock %}
