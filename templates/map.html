{% extends 'base.html' %}
{% block title %}Live Map — Bazaar{% endblock %}
{% block extra_css %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
/* CRITICAL: map page must not inherit body overflow */
body { overflow: hidden !important; }

.map-page {
  display: flex;
  width: 100vw;
  height: calc(100vh - 64px);
  overflow: hidden;
}

/* The map container MUST have an explicit pixel height */
.map-wrap {
  flex: 1;
  position: relative;
  min-width: 0;
}

#full-map {
  width: 100%;
  height: 100%;
  min-height: 400px;
  background: #1a1a2e;
  z-index: 1;
}

/* Sidebar */
.map-sidebar {
  width: 360px;
  min-width: 280px;
  background: var(--bg2);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  z-index: 10;
}
.map-sidebar-header {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.map-sidebar-title {
  font-family: 'Syne', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  margin-bottom: 10px;
}
.map-filters {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 8px;
}
.filter-chip {
  padding: 4px 12px;
  border-radius: 50px;
  font-size: 0.75rem;
  background: var(--bg3);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.2s;
  color: var(--text2);
  white-space: nowrap;
}
.filter-chip.active,
.filter-chip:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(233,69,96,0.1);
}
.listing-count {
  font-size: 0.78rem;
  color: var(--text2);
  margin-top: 4px;
}
#sidebar-list {
  flex: 1;
  overflow-y: auto;
  overscroll-behavior: contain;
}
.mlc {
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  display: flex;
  gap: 10px;
  align-items: flex-start;
  transition: background 0.15s;
}
.mlc:hover { background: var(--card); }
.mlc.active {
  background: rgba(233,69,96,0.08);
  border-left: 3px solid var(--accent);
}
.mlc-thumb {
  width: 64px; height: 64px;
  border-radius: 8px;
  object-fit: cover;
  background: var(--bg3);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.6rem;
  overflow: hidden;
}
.mlc-thumb img {
  width: 100%; height: 100%;
  object-fit: cover; border-radius: 8px;
}
.mlc-title {
  font-size: 0.82rem;
  font-weight: 600;
  line-height: 1.3;
  margin-bottom: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 200px;
}
.mlc-price {
  color: var(--accent);
  font-weight: 700;
  font-family: 'Syne', sans-serif;
  font-size: 0.9rem;
}
.mlc-meta {
  font-size: 0.72rem;
  color: var(--text2);
  margin-top: 3px;
}
.mlc-dist {
  font-size: 0.7rem;
  color: var(--accent2);
  margin-top: 2px;
}

/* Floating buttons on map */
.map-btn {
  position: absolute;
  z-index: 500;
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 10px;
  padding: 9px 16px;
  cursor: pointer;
  font-family: inherit;
  font-size: 0.82rem;
  font-weight: 600;
  box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.map-btn:hover { border-color: var(--accent); color: var(--accent); }
#loc-btn  { bottom: 20px; left: 20px; }
#zoom-in  { top: 20px; right: 20px; }

/* Leaflet popup custom style */
.leaflet-popup-content-wrapper {
  background: #16213e;
  border: 1px solid rgba(233,69,96,0.4);
  border-radius: 12px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  color: #e8e8f0;
  padding: 0;
}
.leaflet-popup-content {
  margin: 0;
  min-width: 220px;
}
.leaflet-popup-tip-container { display: none; }
.leaflet-popup-close-button {
  color: #e94560 !important;
  font-size: 18px !important;
  top: 6px !important;
  right: 10px !important;
}
.popup-inner { padding: 14px 16px; }
.popup-title { font-weight: 700; font-size: 0.875rem; margin-bottom: 4px; line-height: 1.3; }
.popup-price { color: #e94560; font-weight: 800; font-family: 'Syne', sans-serif; font-size: 1rem; }
.popup-meta  { font-size: 0.72rem; color: #9090b0; margin-top: 6px; }
.popup-btn {
  display: block; margin-top: 10px; background: #e94560; color: white;
  text-align: center; padding: 8px; border-radius: 8px;
  font-size: 0.8rem; font-weight: 600; text-decoration: none;
  transition: background 0.2s;
}
.popup-btn:hover { background: #c73050; }

/* No listings state */
.no-listings {
  padding: 40px 20px;
  text-align: center;
  color: var(--text2);
}
.no-listings .icon { font-size: 2.5rem; margin-bottom: 12px; }

/* Responsive */
@media (max-width: 768px) {
  .map-page { flex-direction: column-reverse; }
  .map-sidebar {
    width: 100%;
    min-width: unset;
    height: 220px;
    border-left: none;
    border-top: 1px solid var(--border);
  }
  #full-map { min-height: 300px; }
}
</style>
{% endblock %}

{% block content %}
<div class="map-page">

  <!-- ── MAP ── -->
  <div class="map-wrap">
    <div id="full-map"></div>

    <button class="map-btn" id="loc-btn" onclick="goToMyLocation()">
      <i class="fas fa-crosshairs"></i> My Location
    </button>
  </div>

  <!-- ── SIDEBAR ── -->
  <div class="map-sidebar">
    <div class="map-sidebar-header">
      <div class="map-sidebar-title">🗺️ Listings on Map</div>
      <div class="map-filters" id="cat-filters">
        <div class="filter-chip active" onclick="filterCat('all', this)">All</div>
      </div>
      <div class="listing-count" id="list-count">Loading…</div>
    </div>
    <div id="sidebar-list">
      <div class="no-listings">
        <div class="icon">🗺️</div>
        <div>Loading listings…</div>
      </div>
    </div>
  </div>

</div>
{% endblock %}

{% block scripts %}
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ── DATA ──────────────────────────────────────────────────────────────
const ALL = {{ listings_json|safe }};
let map, markerLayer = L.layerGroup(), userMarker = null;
let userLat = null, userLng = null;
let activeId = null;

// ── INIT MAP ─────────────────────────────────────────────────────────
function initMap() {
  // Center on India if no listings, otherwise fit bounds
  map = L.map('full-map', {
    center: [20.5937, 78.9629],
    zoom: 5,
    zoomControl: false,   // we'll add it manually so it doesn't overlap
  });

  // Add zoom control to bottom-right to avoid overlap with our buttons
  L.control.zoom({ position: 'bottomright' }).addTo(map);

  // FREE tile provider: OpenStreetMap (no API key needed)
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    maxZoom: 19,
  }).addTo(map);

  markerLayer.addTo(map);
  buildFilters();
  renderAll(ALL);
}

// ── FILTERS ──────────────────────────────────────────────────────────
function buildFilters() {
  const cats = [...new Set(ALL.map(l => l.category).filter(Boolean))];
  const wrap = document.getElementById('cat-filters');
  cats.forEach(cat => {
    const chip = document.createElement('div');
    chip.className = 'filter-chip';
    chip.textContent = cat;
    chip.onclick = () => filterCat(cat, chip);
    wrap.appendChild(chip);
  });
}

function filterCat(cat, el) {
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  const filtered = cat === 'all' ? ALL : ALL.filter(l => l.category === cat);
  renderAll(filtered);
}

// ── RENDER ───────────────────────────────────────────────────────────
function renderAll(listings) {
  markerLayer.clearLayers();
  const sidebar = document.getElementById('sidebar-list');
  sidebar.innerHTML = '';

  const withCoords = listings.filter(l => l.lat && l.lng);
  document.getElementById('list-count').textContent =
    `${withCoords.length} listing${withCoords.length !== 1 ? 's' : ''} found`;

  if (!withCoords.length) {
    sidebar.innerHTML = `<div class="no-listings"><div class="icon">😕</div><div>No listings in this area</div></div>`;
    return;
  }

  withCoords.forEach(l => {
    // ── MARKER ──
    const priceLabel = l.price >= 1000
      ? '₹' + (l.price / 1000).toFixed(0) + 'k'
      : '₹' + l.price;

    const icon = L.divIcon({
      html: `<div style="
        background:#e94560;color:#fff;
        padding:3px 8px;border-radius:20px;
        font-size:11px;font-weight:700;
        white-space:nowrap;cursor:pointer;
        box-shadow:0 2px 8px rgba(0,0,0,0.5);
        border:1.5px solid rgba(255,255,255,0.3);
        transition:transform 0.15s;
      ">${priceLabel}</div>`,
      className: '',
      iconAnchor: [24, 12],
    });

    const marker = L.marker([l.lat, l.lng], { icon }).addTo(markerLayer);

    // Popup
    const aiTag = l.ai_verified
      ? '<span style="color:#0fcf6f;font-weight:700">✅ AI Verified</span>'
      : (l.ai_score < 60 ? '<span style="color:#f5a623">⚠️ Review Needed</span>' : '');

    marker.bindPopup(`
      <div class="popup-inner">
        <div class="popup-price">${priceLabel.replace('₹','₹')} — ${l.title.substring(0,40)}${l.title.length>40?'…':''}</div>
        <div class="popup-meta">
          📍 ${l.city || 'Location set'} &nbsp;·&nbsp; ${l.cat_icon || ''} ${l.category}
          ${aiTag ? '<br>' + aiTag : ''}
        </div>
        <a class="popup-btn" href="/listing/${l.id}" target="_blank">View Listing →</a>
      </div>
    `, { maxWidth: 260, closeButton: true });

    marker.on('click', () => {
      highlightSidebar(l.id);
      updateDistance(l);
    });

    // ── SIDEBAR CARD ──
    const card = document.createElement('div');
    card.className = 'mlc';
    card.id = `mlc-${l.id}`;
    card.innerHTML = `
      <div class="mlc-thumb">
        ${l.image
          ? `<img src="/static/uploads/${l.image}" alt="">`
          : `<span>${l.cat_icon || '📦'}</span>`}
      </div>
      <div style="flex:1;min-width:0">
        <div class="mlc-title">${l.title}</div>
        <div class="mlc-price">₹${Number(l.price).toLocaleString('en-IN')}</div>
        <div class="mlc-meta">📍 ${l.city || 'Unknown'} · ${l.category}</div>
        <div class="mlc-dist" id="dist-${l.id}"></div>
      </div>`;

    card.addEventListener('click', () => {
      highlightSidebar(l.id);
      map.setView([l.lat, l.lng], 15);
      marker.openPopup();
      updateDistance(l);
    });

    sidebar.appendChild(card);
  });

  // Fit map to markers
  if (withCoords.length) {
    const bounds = L.latLngBounds(withCoords.map(l => [l.lat, l.lng]));
    if (bounds.isValid()) map.fitBounds(bounds, { padding: [40, 40], maxZoom: 13 });
  }
}

// ── HELPERS ──────────────────────────────────────────────────────────
function highlightSidebar(id) {
  document.querySelectorAll('.mlc').forEach(c => c.classList.remove('active'));
  const card = document.getElementById(`mlc-${id}`);
  if (card) {
    card.classList.add('active');
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
  activeId = id;
}

function updateDistance(l) {
  if (userLat === null) return;
  fetch(`/api/distance?lat1=${userLat}&lng1=${userLng}&lat2=${l.lat}&lng2=${l.lng}`)
    .then(r => r.json())
    .then(d => {
      const el = document.getElementById(`dist-${l.id}`);
      if (el && d.delivery_text) el.textContent = `🚗 ${d.delivery_text}`;
    })
    .catch(() => {});
}

function goToMyLocation() {
  if (!navigator.geolocation) {
    alert('Geolocation is not supported by your browser.');
    return;
  }
  const btn = document.getElementById('loc-btn');
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Locating…';
  btn.disabled = true;

  navigator.geolocation.getCurrentPosition(
    pos => {
      userLat = pos.coords.latitude;
      userLng = pos.coords.longitude;

      if (userMarker) map.removeLayer(userMarker);
      userMarker = L.circleMarker([userLat, userLng], {
        radius: 10, color: '#0fcf6f', fillColor: '#0fcf6f', fillOpacity: 0.85, weight: 2
      }).addTo(map).bindPopup('📍 You are here').openPopup();

      map.setView([userLat, userLng], 13);

      // Calculate distances for all visible cards
      ALL.filter(l => l.lat && l.lng).forEach(l => updateDistance(l));

      btn.innerHTML = '<i class="fas fa-check"></i> Located!';
      btn.style.borderColor = 'var(--green)';
      btn.style.color = 'var(--green)';
      setTimeout(() => {
        btn.innerHTML = '<i class="fas fa-crosshairs"></i> My Location';
        btn.style.borderColor = '';
        btn.style.color = '';
        btn.disabled = false;
      }, 3000);
    },
    err => {
      btn.innerHTML = '<i class="fas fa-crosshairs"></i> My Location';
      btn.disabled = false;
      alert('Could not get your location. Please allow location access in your browser.');
    }
  );
}

// ── START ─────────────────────────────────────────────────────────────
// Must wait for DOM to be fully ready before initializing Leaflet
document.addEventListener('DOMContentLoaded', initMap);
</script>
{% endblock %}
